<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" role="img" aria-label="Horizon - Powering Your Digital Future">
  <!-- Blue left bracket -->
  <rect x="50" y="5" width="58" height="21" fill="#1E3A6E"/>
  <rect x="50" y="5" width="21" height="90" fill="#1E3A6E"/>
  <rect x="50" y="74" width="58" height="21" fill="#1E3A6E"/>
  <!-- Orange right bracket (interlocked) -->
  <rect x="84" y="19" width="66" height="21" fill="#C98120"/>
  <rect x="129" y="19" width="21" height="77" fill="#C98120"/>
  <rect x="84" y="60" width="66" height="21" fill="#C98120"/>
